<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画ビューアー</title>
    
    <!-- CSS：distを抜いた直通パス -->
    <link rel="stylesheet" href="laymic/laymic.min.css">
    
    <style>
        #laymic { 
            opacity: 0; 
            transition: opacity 0.5s;
        }
        #laymic img { 
            width: 100%; 
        }
        body {
            background-color: #333;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <div id="laymic">
      <img src="assets/004.jpg">
      <img src="assets/005.jpg">
      <img src="assets/006.jpg">
      <img src="assets/007.jpg">
      <img src="assets/008.jpg">
      <img src="assets/009.jpg">
      <img src="assets/010.jpg">
      <img src="assets/011.jpg">
    </div>

    <!-- JS：distを抜いた直通パス -->
    <script src="laymic/laymic.iife.min.js"></script>
    
    <script>
      function startLaymic() {
        if (typeof Laymic !== 'undefined') {
          try {
            new Laymic('#laymic', {
              direction: 'rtl'
            });
            document.getElementById('laymic').style.opacity = 1;
            console.log("Laymic起動成功！");
          } catch (error) {
            console.error("初期化エラー:", error);
          }
        } else {
          console.log("Laymicを待機中（パスを確認してください）");
          setTimeout(startLaymic, 300);
        }
      }

      startLaymic();
    </script>
</body>
</html>
