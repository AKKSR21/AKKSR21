<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画ビューアー</title>
    
    <!-- CSSのパス：相対パスで指定 -->
    <link rel="stylesheet" href="laymic/dist/laymic.min.css">
    
    <style>
        /* 読み込みが完了するまで画面を隠して、バラバラの画像を見せないようにする */
        #laymic { 
            opacity: 0; 
            transition: opacity 0.5s;
        }
        #laymic img { 
            width: 100%; 
        }
        body {
            background-color: #333;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <!-- 漫画の画像リスト -->
    <div id="laymic">
      <img src="assets/004.jpg">
      <img src="assets/005.jpg">
      <img src="assets/006.jpg">
      <img src="assets/007.jpg">
      <img src="assets/008.jpg">
      <img src="assets/009.jpg">
      <img src="assets/010.jpg">
      <img src="assets/011.jpg">
    </div>

    <!-- JSの読み込み：相対パス -->
    <script src="laymic/dist/laymic.iife.min.js"></script>
    
    <script>
      /**
       * Laymicが読み込まれるまで繰り返しチェックして起動する関数
       */
      function startLaymic() {
        // Laymicという関数（クラス）が存在するかチェック
        if (typeof Laymic !== 'undefined') {
          try {
            console.log("Laymicが見つかりました。起動します...");
            
            new Laymic('#laymic', {
              direction: 'rtl' // 右から左（和書・漫画）方向
            });

            // 起動に成功したら、ふわっと表示させる
            document.getElementById('laymic').style.opacity = 1;
            
          } catch (error) {
            console.error("Laymicの初期化中にエラーが発生しました:", error);
          }
        } else {
          // まだ読み込まれていなければ0.3秒後に再チャレンジ
          console.log("Laymicを読み込み中...");
          setTimeout(startLaymic, 300);
        }
      }

      // 実行開始
      startLaymic();
    </script>
</body>
</html>
