<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画ビューアー</title>
    <!-- CSSは一旦ネットから読み込みますが、万が一のために読み込みチェックを入れます -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/laymic@1.2.2/dist/laymic.min.css">
    <style>
        body { background-color: #1a1a1a; margin: 0; padding: 0; color: white; }
        #laymic { opacity: 0; transition: opacity 0.5s; }
        #laymic img { width: 100%; display: block; }
        #fatal-error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #ff6b6b; display: none; }
    </style>
</head>
<body>

    <div id="fatal-error">
        <h3>起動できませんでした</h3>
        <p id="error-msg"></p>
    </div>

    <div id="laymic">
      <img src="assets/004.jpg">
      <img src="assets/005.jpg">
      <img src="assets/006.jpg">
      <img src="assets/007.jpg">
      <img src="assets/008.jpg">
      <img src="assets/009.jpg">
      <img src="assets/010.jpg">
      <img src="assets/011.jpg">
    </div>

    <!-- ここに外部ファイルの代わりに、JSを読み込むためのスクリプトを設置 -->
    <script src="https://unpkg.com/laymic@1.2.2/dist/laymic.iife.min.js"></script>

    <script>
      // ページ読み込み完了時に実行
      window.addEventListener('DOMContentLoaded', () => {
        const checkLaymic = () => {
          if (typeof Laymic !== 'undefined') {
            try {
              new Laymic('#laymic', {
                direction: 'rtl'
              });
              document.getElementById('laymic').style.opacity = 1;
              console.log("Laymic successfully started!");
            } catch (e) {
              showError("初期化エラー: " + e.message);
            }
          } else {
            showError("ライブラリが見つかりません。ネット接続を確認するか、F5キーで再読み込みしてください。");
          }
        };

        function showError(msg) {
          const errDiv = document.getElementById('fatal-error');
          errDiv.style.display = 'block';
          document.getElementById('error-msg').innerText = msg;
        }

        // 念のため少しだけ待ってから開始（読み込み待ち）
        setTimeout(checkLaymic, 500);
      });
    </script>
</body>
</html>
